<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<div style="position:relative;background:#FFFFFF;border:1.5px solid #EADFD2;border-radius:16px;overflow:hidden;transition:transform .25s cubic-bezier(.2,.7,.2,1),box-shadow .25s,border-color .25s;cursor:pointer;" style-hover="transform:translateY(-6px);box-shadow:0 18px 38px rgba(33,27,23,.14);border-color:#E8492B;">

  <div style="position:relative;height:138px;background:repeating-linear-gradient(135deg,#F7EFE6,#F7EFE6 14px,#FBF6EE 14px,#FBF6EE 28px);display:flex;align-items:center;justify-content:center;border-bottom:1.5px solid #EADFD2;">
    <span style="font-family:monospace;font-size:11px;color:#BCAE9D;">{{ img }}</span>

    <sc-if value="{{ hasOff }}" hint-placeholder-val="{{ true }}">
      <span style="position:absolute;top:10px;left:10px;background:#E8492B;color:#fff;font-weight:800;font-size:12px;padding:4px 9px;border-radius:8px;box-shadow:0 4px 12px rgba(232,73,43,.35);">{{ off }} OFF</span>
    </sc-if>
    <sc-if value="{{ isDeal }}" hint-placeholder-val="{{ false }}">
      <span style="position:absolute;top:10px;left:10px;background:#211B17;color:#fff;font-weight:800;font-size:10px;letter-spacing:.5px;text-transform:uppercase;padding:5px 9px;border-radius:8px;box-shadow:0 4px 12px rgba(33,27,23,.3);">Offer</span>
    </sc-if>

    <sc-if value="{{ available }}" hint-placeholder-val="{{ true }}">
      <span style="position:absolute;top:10px;right:10px;display:flex;align-items:center;gap:5px;background:#E6F4EC;color:#1E7A45;font-weight:700;font-size:11px;padding:4px 9px;border-radius:20px;"><span style="width:7px;height:7px;border-radius:50%;background:#2E9E5B;"></span>Available</span>
    </sc-if>
    <sc-if value="{{ out }}" hint-placeholder-val="{{ false }}">
      <span style="position:absolute;top:10px;right:10px;display:flex;align-items:center;gap:5px;background:#ECE5DC;color:#8A7F73;font-weight:700;font-size:11px;padding:4px 9px;border-radius:20px;"><span style="width:7px;height:7px;border-radius:50%;background:#B6A899;"></span>Out of Stock</span>
    </sc-if>
  </div>

  <div style="padding:13px 15px 15px;">
    <div style="font-size:11px;letter-spacing:.6px;text-transform:uppercase;color:#A2937F;font-weight:700;">{{ cat }}</div>
    <div style="font-size:15px;font-weight:600;color:#211B17;line-height:1.25;margin-top:3px;min-height:38px;">{{ title }}</div>

    <span style="display:inline-block;margin-top:10px;background:#FBE7DF;color:#C73A1F;font-weight:800;font-size:9px;letter-spacing:.7px;text-transform:uppercase;padding:3px 7px;border-radius:6px;">Offer</span>

    <sc-if value="{{ isDeal }}" hint-placeholder-val="{{ false }}">
      <div style="font-size:20px;font-weight:800;color:#E8492B;margin-top:6px;line-height:1.12;">{{ offer }}</div>
    </sc-if>
    <sc-if value="{{ isPrice }}" hint-placeholder-val="{{ true }}">
      <div style="font-family:'Caveat',cursive;font-size:33px;font-weight:700;color:#E8492B;line-height:1;margin-top:4px;">{{ offerPrice }}</div>
    </sc-if>

    <sc-if value="{{ hasNote }}" hint-placeholder-val="{{ true }}">
      <div style="font-size:11.5px;color:#8A7F73;margin-top:5px;line-height:1.35;">{{ note }}</div>
    </sc-if>
  </div>

  <sc-if value="{{ out }}" hint-placeholder-val="{{ false }}">
    <div style="position:absolute;inset:0;background:rgba(251,246,238,.55);pointer-events:none;"></div>
  </sc-if>
</div>
</x-dc>
<script type="text/x-dc" data-dc-script data-props="{&quot;$preview&quot;:{&quot;width&quot;:260,&quot;height&quot;:320},&quot;title&quot;:{&quot;editor&quot;:&quot;text&quot;,&quot;default&quot;:&quot;Tata Tea Premium 1.5 KG&quot;,&quot;tsType&quot;:&quot;string&quot;},&quot;cat&quot;:{&quot;editor&quot;:&quot;text&quot;,&quot;default&quot;:&quot;Beverages&quot;,&quot;tsType&quot;:&quot;string&quot;},&quot;offer&quot;:{&quot;editor&quot;:&quot;text&quot;,&quot;default&quot;:&quot;₹402&quot;,&quot;tsType&quot;:&quot;string&quot;},&quot;note&quot;:{&quot;editor&quot;:&quot;text&quot;,&quot;default&quot;:&quot;Per KG · Big Savings&quot;,&quot;tsType&quot;:&quot;string&quot;},&quot;off&quot;:{&quot;editor&quot;:&quot;text&quot;,&quot;default&quot;:&quot;&quot;,&quot;tsType&quot;:&quot;string&quot;},&quot;img&quot;:{&quot;editor&quot;:&quot;text&quot;,&quot;default&quot;:&quot;[ product ]&quot;,&quot;tsType&quot;:&quot;string&quot;},&quot;available&quot;:{&quot;editor&quot;:&quot;boolean&quot;,&quot;default&quot;:true,&quot;tsType&quot;:&quot;boolean&quot;}}">
class Component extends DCLogic {
  renderVals() {
    const p = this.props;
    const offer = (p.offer != null ? String(p.offer) : '').trim();
    // OFFER / PRICE column: a deal phrase has letters ("Buy 1 Get 1 Free");
    // a plain price ("402", "137.99", "₹245") does not.
    const isDeal = /[a-z]/i.test(offer);
    const isPrice = !!offer && !isDeal;
    let offerPrice = offer;
    if (isPrice && offer[0] !== '₹') offerPrice = '₹' + offer;
    const off = p.off || '';
    return {
      out: !p.available,
      offer, isDeal, isPrice, offerPrice,
      note: p.note || '', hasNote: !!p.note,
      off, hasOff: !!off
    };
  }
}
</script>
</body>
</html>
