# Runs the Next.js site behind the VPS's existing Traefik reverse proxy.
# The image is built and published to GHCR by .github/workflows/deploy.yml;
# the VPS just pulls and runs it. Traefik (host-network mode) discovers this
# container via the labels below, routes srv1763507.hstgr.cloud to it, and
# issues a Let's Encrypt certificate.
services:
  web:
    image: ghcr.io/shram2267/rajmandir-website:latest
    restart: unless-stopped
    expose:
      - "3000"
    labels:
      - traefik.enable=true
      - traefik.http.routers.rajmandir.rule=Host(`srv1763507.hstgr.cloud`)
      - traefik.http.routers.rajmandir.entrypoints=websecure
      - traefik.http.routers.rajmandir.tls.certresolver=letsencrypt
      - traefik.http.services.rajmandir.loadbalancer.server.port=3000
