name: Build and push image

on:
  push:
    branches: [master]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ghcr.io/shram2267/rajmandir-website:latest
          # NEXT_PUBLIC_* keys are public client-side values (shipped to every
          # browser), so it is safe to inline them here as build args.
          build-args: |
            NEXT_PUBLIC_SUPABASE_URL=https://xhncgcvabwmeevssgenx.supabase.co
            NEXT_PUBLIC_SUPABASE_ANON_KEY=eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InhobmNnY3ZhYndtZWV2c3NnZW54Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODIyMTU2MzksImV4cCI6MjA5Nzc5MTYzOX0.Z1MGxnAJlh4im_S9oxqdUnijb_gHVMrdVPLWf79KPck
            NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY=sb_publishable_dOqhtWBiRsi3HW4J6iTOxw_RN5wWoeJ
